events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;
    resolver 127.0.0.11 valid=10s ipv6=off;

    server {
        listen 80;
        server_name localhost;

        # Healthcheck endpoint
        location /health {
            default_type application/json;
            return 200 '{"status": "ok", "service": "gateway-service (nginx)"}';
        }

        location /auth/customer/ {
            set $customer_upstream http://customer-service:8000;
            proxy_pass $customer_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /auth/staff/ {
            set $staff_upstream http://staff-service:8000;
            proxy_pass $staff_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /catalog/ {
            set $customer_upstream http://customer-service:8000;
            proxy_pass $customer_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Route to Customer Service
        location /customer/ {
            set $customer_upstream http://customer-service:8000;
            proxy_pass $customer_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Route to Staff Service
        location /staff/ {
            set $staff_upstream http://staff-service:8000;
            proxy_pass $staff_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Route to Laptop Service
        location /laptop/ {
            set $laptop_upstream http://laptop-service:8000;
            proxy_pass $laptop_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Route to Order Service
        location /orders/ {
            set $order_upstream http://order-service:8000;
            proxy_pass $order_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Route to Payment Service
        location /payment/ {
            set $payment_upstream http://payment-service:8000;
            proxy_pass $payment_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Route to Inventory Service
        location /inventory/ {
            set $inventory_upstream http://inventory-service:8000;
            proxy_pass $inventory_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Route to Mobile Service
        location /mobile/ {
            set $mobile_upstream http://mobile-service:8000;
            proxy_pass $mobile_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Route to PC Service
        location /pc/ {
            set $pc_upstream http://pc-service:8000;
            rewrite ^/pc/?(.*)$ /$1 break;
            proxy_pass $pc_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Route to Cart Service
        location /cart/ {
            set $cart_upstream http://cart-service:8000;
            proxy_pass $cart_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Route to AI Assistant Service
        location /ai/ {
            set $ai_upstream http://ai-service:8000;
            rewrite ^/ai/?(.*)$ /$1 break;
            proxy_pass $ai_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Catch-all
        location / {
            default_type application/json;
            return 404 '{"error": "Endpoint not found or moved (Nginx Gateway)"}';
        }
    }
}
